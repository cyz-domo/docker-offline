name: Build Offline Docker Package
run-name: Build Docker ${{ inputs.custom_docker_version != '' && inputs.custom_docker_version || inputs.docker_version }} (${{ inputs.arch }})

env:
  EFFECTIVE_DOCKER_VERSION: ${{ inputs.custom_docker_version != '' && inputs.custom_docker_version || inputs.docker_version }}

on:
  workflow_dispatch:
    inputs:
      custom_docker_version:
        description: 'Custom Docker version (leave empty to use preset below)'
        required: false
        type: string
      docker_version:
        description: 'Stable Docker version shortcut'
        required: true
        type: choice
        options:
          - '29.6.1'
          - '24.0.6'
          - '23.0.6'
          - '20.10.24'
          - '19.03.15'
          - '18.09.9'
        default: '29.6.1'
      arch:
        description: 'Target CPU architecture'
        required: true
        type: choice
        options:
          - x86_64
          - aarch64
        default: 'x86_64'
      china_mirror:
        description: 'Use ghproxy.com to proxy GitHub downloads'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build Docker ${{ env.EFFECTIVE_DOCKER_VERSION }} (${{ inputs.arch }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build offline Docker package
        run: |
          set -euo pipefail
          MIRROR_FLAG=""
          if [ "${{ inputs.china_mirror }}" = "true" ]; then
            MIRROR_FLAG="--china-mirror"
          fi
          bash build_offline.sh \
            --version "${{ env.EFFECTIVE_DOCKER_VERSION }}" \
            --arch "${{ inputs.arch }}" \
            $MIRROR_FLAG \
            --non-interactive

      - name: Package as tar.gz (flat, no wrapper directory)
        run: |
          set -euo pipefail
          srcdir=$(echo offline-docker-*/)
          pkg="offline-docker-${{ env.EFFECTIVE_DOCKER_VERSION }}-${{ inputs.arch }}.tar.gz"
          tar -czf "${pkg}" -C "${srcdir}" .
          echo "Archive: ${pkg} ($(du -sh "${pkg}" | cut -f1))"
          echo "Contents:"
          tar tzf "${pkg}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: offline-docker-${{ env.EFFECTIVE_DOCKER_VERSION }}-${{ inputs.arch }}
          path: offline-docker-*.tar.gz
          retention-days: 30
