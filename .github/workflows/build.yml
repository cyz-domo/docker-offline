name: Build Offline Docker Package

on:
  workflow_dispatch:
    inputs:
      docker_version:
        description: 'Docker version (e.g. 29.6.1)'
        required: true
        type: string
        default: '29.6.1'
      arch:
        description: 'Target CPU architecture'
        required: true
        type: choice
        options:
          - x86_64
          - aarch64
        default: 'x86_64'
      china_mirror:
        description: 'Use ghproxy.com to proxy GitHub downloads'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build offline Docker package
        run: |
          set -euo pipefail
          MIRROR_FLAG=""
          if [ "${{ inputs.china_mirror }}" = "true" ]; then
            MIRROR_FLAG="--china-mirror"
          fi
          bash build_offline.sh \
            --version "${{ inputs.docker_version }}" \
            --arch "${{ inputs.arch }}" \
            $MIRROR_FLAG \
            --non-interactive

      - name: Package as tar.gz (flat, no wrapper directory)
        run: |
          set -euo pipefail
          srcdir=$(echo offline-docker-*/)
          pkg="offline-docker-${{ inputs.docker_version }}-${{ inputs.arch }}.tar.gz"
          tar -czf "${pkg}" -C "${srcdir}" .
          echo "Archive: ${pkg} ($(du -sh "${pkg}" | cut -f1))"
          echo "Contents:"
          tar tzf "${pkg}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: offline-docker-${{ inputs.docker_version }}-${{ inputs.arch }}
          path: offline-docker-*.tar.gz
          retention-days: 30
